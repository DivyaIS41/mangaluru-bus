name: Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for secrets
        run: |
          # Check for common secret patterns
          if grep -r "password\s*=\s*['\"][^'\"][^'\"]*['\"]" --include="*.py" --include="*.js" --include="*.html"; then
            echo "⚠️ Possible hardcoded password found"
            exit 1
          fi
          
          if grep -r "api.?key\s*=\s*['\"][^'\"]*['\"]" --include="*.py" --include="*.js"; then
            echo "⚠️ Possible hardcoded API key found"
            exit 1
          fi
          
          echo "✅ No obvious secrets detected"
  
  env-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for .env files
        run: |
          if [ -f .env ] || [ -f .env.local ] || [ -f .env.production ]; then
            echo "❌ ERROR: .env files should not be committed"
            exit 1
          fi
          echo "✅ No .env files detected"
  
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install flake8
        run: pip install flake8
      
      - name: Lint Python files
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true
